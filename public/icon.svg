<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <radialGradient id="bun" cx="40%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- top bun -->
  <ellipse cx="256" cy="200" rx="180" ry="85" fill="url(#bun)"/>
  <circle cx="200" cy="170" r="10" fill="#fff7ed" opacity="0.7"/>
  <circle cx="270" cy="155" r="8"  fill="#fff7ed" opacity="0.7"/>
  <circle cx="320" cy="178" r="7"  fill="#fff7ed" opacity="0.7"/>
  <!-- lettuce -->
  <path d="M 80 240 Q 120 230 160 245 Q 220 230 260 248 Q 320 230 360 245 Q 400 230 432 240 L 432 270 L 80 270 Z" fill="#22c55e"/>
  <!-- patty -->
  <rect x="80" y="260" width="352" height="42" rx="20" fill="#7c2d12"/>
  <!-- cheese -->
  <path d="M 80 295 L 432 295 L 410 322 L 102 322 Z" fill="#fbbf24"/>
  <!-- bottom bun -->
